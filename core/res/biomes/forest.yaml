# Class
name: Forest
namespace: Apostasy
class: Biome
#Generation
amplitude: 6.5
frequency: 0.03
octaves: 6
tree_density: 12.0
boulder_density: 0.05
#Generation Location
humidity: 0.65
temperature: 0.35
# Voxels
voxel:
  surface:
    - "Apostasy:Voxel:Grass"
  subsurface:
    - "Apostasy:Voxel:Dirt"
  underground:
    - "Apostasy:Voxel:Dirt"
# Weather and Seasons
default_weather:
  - name: "Apostasy:Weather:Sunny"
seasons:
  - name: "Apostasy:Seasons:Spring"
    temperature: [5.0, 15.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.05
      - name: "Apostasy:Weather:HeavyRain"
        chance: 0.02
      - name: "Apostasy:Weather:Thunder"
        chance: 0.01
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.25
  - name: "Apostasy:Seasons:Summer"
    temperature: [15.0, 25.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.05
  - name: "Apostasy:Seasons:Autumn"
    temperature: [5.0, 10.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.1
      - name: "Apostasy:Weather:Snow"
        chance: 0.05
  - name: "Apostasy:Seasons:Winter"
    temperature: [-5.0, 5.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.05
      - name: "Apostasy:Weather:Snow"
        chance: 0.1
# Graphics
ambient_graphics:
  water_color:
    rgb: [255, 255, 255]
  foliage_color:
    rgb: [255, 255, 255]
